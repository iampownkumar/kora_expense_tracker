name: kora_expense_tracker
description: "A modern, intuitive expense tracker app with Material 3 design and multi-language support."

# Prevents accidental publishing to pub.dev
publish_to: 'none'

# Application version and build number
# Format: [major].[minor].[patch]+[build_number]
version: 1.0.1+3

# Dart SDK environment constraints
environment:
  sdk: ^3.9.0

dependencies:
  # Core Flutter framework
  flutter:
    sdk: flutter
    
  # Localization capabilities for multi-language support
  flutter_localizations:
    sdk: flutter

  # --- UI & Design ---
  # Standard iOS-style icons
  cupertino_icons: ^1.0.8
  
  # --- State Management ---
  # Core state management solution using the Provider pattern
  provider: ^6.1.2
  
  # --- Utilities & Data Processing ---
  # Internationalization and date/number formatting
  intl: ^0.20.2
  # Handling CSV parsing and generation for data import/export
  csv: ^8.0.0
  # Path manipulation utilities
  path: ^1.9.1
  
  # --- Storage & Database ---
  # Lightweight key-value storage for app settings and simple preferences
  shared_preferences: ^2.2.3
  # SQLite database implementation for robust, persistent data storage
  sqflite: ^2.4.2
  
  # --- File Handling & Permissions ---
  # UI for selecting files from device storage (e.g., CSV imports)
  file_picker: ^8.0.0+1
  # Locating standard device directories (Documents, Downloads, etc.)
  path_provider: ^2.1.5
  # Requesting and handling OS-level permissions (storage, camera)
  permission_handler: ^12.0.1
  # Selecting images from device gallery or camera for transaction receipts
  image_picker: ^1.2.1
  
  # --- Document Generation ---
  # Generating PDF reports and statements
  pdf: ^3.12.0
  # Printing capabilities and PDF preview logic
  printing: ^5.14.3
  
  # --- Serialization ---
  # Annotations for JSON serialization (works with json_serializable in dev_dependencies)
  json_annotation: ^4.9.0

dev_dependencies:
  # Core testing framework
  flutter_test:
    sdk: flutter

  # --- Linting & Code Quality ---
  # Standard Flutter lint rules established by the Flutter team
  flutter_lints: ^5.0.0
  
  # --- Code Generation ---
  # Generates boilerplate JSON serialization code
  json_serializable: ^6.7.1
  # Core runner for executing code generators
  build_runner: ^2.4.8
  
  # --- Asset Generation ---
  # Tool for automatically generating app icons across platforms based on a source image
  flutter_launcher_icons: ^0.14.4

flutter:
  # Ensures Material Design fonts and icons are included
  uses-material-design: true

  # Registered app-level assets
  assets:
    - assets/icon/

  # Custom fonts configuration
  # Fonts (commented out until font files are added)
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

# Configuration for flutter_launcher_icons package
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0F172A"
    theme_color: "#0F172A"
